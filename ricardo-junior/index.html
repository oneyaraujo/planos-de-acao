<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Ação — Ricardo Júnior | VIRAL PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #ffffff; --bg-soft: #fafafa; --card: #ffffff; --card-border: #e8e8ed;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --ig-purple: #833AB4; --ig-pink: #E1306C; --ig-orange: #F77737;
  --ig-yellow: #FCAF45; --ig-blue: #405DE6;
  --ig-gradient: linear-gradient(135deg, #405DE6, #833AB4, #E1306C, #F77737, #FCAF45);
  --ig-gradient-soft: linear-gradient(135deg, rgba(64,93,230,0.08), rgba(131,58,180,0.08), rgba(225,48,108,0.08), rgba(247,119,55,0.08));
  --green: #00C853; --green-soft: rgba(0, 200, 83, 0.08); --red: #E1306C;
  --red-soft: rgba(225, 48, 108, 0.07); --yellow: #F77737; --yellow-soft: rgba(247, 119, 55, 0.07);
  --blue: #405DE6; --blue-soft: rgba(64, 93, 230, 0.07); --purple: #833AB4;
  --purple-soft: rgba(131, 58, 180, 0.07); --pink: #E1306C; --pink-soft: rgba(225, 48, 108, 0.07);
  --cyan: #00B4D8; --cyan-soft: rgba(0, 180, 216, 0.07); --orange: #F77737;
  --orange-soft: rgba(247, 119, 55, 0.07); --text: #1a1a2e; --text-secondary: #4a4a5a;
  --text-muted: #8e8e9a; --text-dim: #b0b0b8;
}
body { font-family: 'Inter', sans-serif; background: var(--bg-soft); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.hero { position: relative; padding: 56px 40px 40px; text-align: center; background: var(--bg); border-bottom: 1px solid var(--card-border); overflow: hidden; }
.hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--ig-gradient); }
</style>
</head>
<body>
<div class="hero">
  <span class="hero-badge">Análise Completa</span>
  <h1>Ricardo Júnior — Plano de Ação VIRAL</h1>
  <p class="hero-sub">Da análise VIRAL PRO: 5 ações urgentes + 14 estratégias para crescer 1M de seguidores</p>
</div>
<div class="main">
  <h2>Próximos Passos</h2>
  <p>Implemente as ações desta página conforme a timeline no final deste documento.</p>
</div>
</body>
</html>
