<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Ação — Júlia Carvalho | Churrasco & Receitas na Brasa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --card: #ffffff;
    --card-border: #e8e8ed;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);

    /* Instagram palette */
    --ig-purple: #833AB4;
    --ig-pink: #E1306C;
    --ig-orange: #F77737;
    --ig-yellow: #FCAF45;
    --ig-blue: #405DE6;
    --ig-gradient: linear-gradient(135deg, #405DE6, #833AB4, #E1306C, #F77737, #FCAF45);
    --ig-gradient-soft: linear-gradient(135deg, rgba(64,93,230,0.08), rgba(131,58,180,0.08), rgba(225,48,108,0.08), rgba(247,119,55,0.08));

    /* Semantic colors */
    --green: #00C853;
    --green-soft: rgba(0, 200, 83, 0.08);
    --red: #E1306C;
    --red-soft: rgba(225, 48, 108, 0.07);
    --yellow: #F77737;
    --yellow-soft: rgba(247, 119, 55, 0.07);
    --blue: #405DE6;
    --blue-soft: rgba(64, 93, 230, 0.07);
    --purple: #833AB4;
    --purple-soft: rgba(131, 58, 180, 0.07);
    --pink: #E1306C;
    --pink-soft: rgba(225, 48, 108, 0.07);
    --cyan: #00B4D8;
    --cyan-soft: rgba(0, 180, 216, 0.07);
    --orange: #F77737;
    --orange-soft: rgba(247, 119, 55, 0.07);

    --text: #1a1a2e;
    --text-secondary: #4a4a5a;
    --text-muted: #8e8e9a;
    --text-dim: #b0b0b8;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-soft);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Hero */
  .hero {
    position: relative;
    padding: 56px 40px 40px;
    text-align: center;
    background: var(--bg);
    border-bottom: 1px solid var(--card-border);
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--ig-gradient);
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ig-gradient);
    border-radius: 100px;
    padding: 8px 22px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .hero h1 {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 14px;
    background: var(--ig-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-sub {
    font-size: 17px;
    color: var(--text-secondary);
    font-weight: 400;
    max-width: 620px;
    margin: 0 auto 28px;
    line-height: 1.65;
  }

  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  .hero-meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .hero-meta-item svg { color: var(--ig-purple); opacity: 0.6; }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 1200px;
    margin: -28px auto 0;
    padding: 0 40px;
    position: relative;
    z-index: 2;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    box-shadow: var(--card-shadow);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--ig-gradient);
  }

  .stat-number { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 2px; }
  .stat-card:nth-child(1) .stat-number { color: var(--ig-pink); }
  .stat-card:nth-child(2) .stat-number { color: var(--ig-purple); }
  .stat-card:nth-child(3) .stat-number { color: var(--ig-orange); }
  .stat-card:nth-child(4) .stat-number { color: var(--ig-blue); }

  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Main */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px; }

  /* Section Headers */
  .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; margin-top: 48px; }
  .section-header:first-child { margin-top: 0; }

  .section-icon {
    width: 46px; height: 46px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  .section-header h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
  .section-header p { font-size: 14px; color: var(--text-muted); margin-top: 2px; }

  /* Action Cards */
  .priority-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

  .action-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 22px 24px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 18px;
    box-shadow: var(--card-shadow);
    transition: all 0.2s ease;
  }

  .action-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-1px); }

  .action-number {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }

  .action-content h3 { font-size: 15px; font-weight: 700; margin-bottom: 5px; line-height: 1.3; color: var(--text); }
  .action-content p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.65; }

  .action-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 100px;
    font-size: 11px; font-weight: 700; white-space: nowrap; margin-top: 4px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }

  .urgency-now .action-number { background: var(--red-soft); color: var(--red); }
  .urgency-now .action-tag { background: var(--red-soft); color: var(--red); }
  .urgency-week .action-number { background: var(--yellow-soft); color: var(--yellow); }
  .urgency-week .action-tag { background: var(--yellow-soft); color: var(--yellow); }
  .urgency-soon .action-number { background: var(--blue-soft); color: var(--blue); }
  .urgency-soon .action-tag { background: var(--blue-soft); color: var(--blue); }

  /* Compare Grid */
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .compare-col {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 24px; box-shadow: var(--card-shadow);
  }

  .compare-col h3 {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 700; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid var(--card-border);
  }

  .compare-col.bad h3 { color: var(--red); }
  .compare-col.good h3 { color: var(--green); }

  .compare-item { display: flex; align-items: start; gap: 10px; padding: 7px 0; font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; }
  .compare-item span { flex-shrink: 0; font-size: 13px; }

  /* Rules Grid */
  .rules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

  .rule-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 22px; text-align: center;
    box-shadow: var(--card-shadow); transition: all 0.2s ease;
  }

  .rule-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-1px); }
  .rule-emoji { font-size: 30px; margin-bottom: 10px; display: block; }
  .rule-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .rule-card p { font-size: 13px; color: var(--text-muted); line-height: 1.55; }

  /* Ideas Grid */
  .ideas-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

  .idea-card {
    background: var(-card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 22px;
    box-shadow: var(--card-shadow); transition: all 0.2s ease;
  }

  .idea-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-2px); }

  -idea-type {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 10px; padding: 4px 10px; border-radius: 6px;
  }

  .idea-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; color: var(--text); }
  .idea-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  .type-reels { background: var(--pink-soft); color: var(--pink); }
